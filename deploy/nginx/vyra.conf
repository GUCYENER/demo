# =============================================================
# VYRA L1 Support — Nginx Reverse Proxy Configuration
# =============================================================
# Windows Nginx: D:\nginx\conf\conf.d\vyra.conf
# Linux Nginx:   /etc/nginx/conf.d/vyra.conf
#
# Kullanım:
#   1) Bu dosyayı Nginx conf.d dizinine kopyalayın
#   2) nginx.conf'ta "include conf.d/*.conf;" satırı olmalı
#   3) nginx -t ile test edin
#   4) nginx -s reload ile aktifleştirin
# =============================================================

upstream vyra_backend {
    ip_hash;  # Aynı IP → aynı worker (WebSocket + HTTP aynı worker'da olmalı)
    server 127.0.0.1:8002;
    keepalive 32;
}

server {
    listen       8000;
    server_name  _;   # Production'da: server_name vyra.company.com;

    # ── HTTP → HTTPS Yönlendirme (SSL aktifken açın) ──
    # return 301 https://$host$request_uri;

    # ── Logging ──
    access_log  logs/vyra_access.log;
    error_log   logs/vyra_error.log warn;

    # ── Genel Ayarlar ──
    client_max_body_size  100M;       # Dosya yükleme limiti (RAG)
    proxy_read_timeout    120s;       # LLM yanıt bekleme süresi
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        image/svg+xml;

    # ── Security Headers ──
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;
    add_header X-XSS-Protection          "1; mode=block"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── 0) DS Discovery — Oracle gibi büyük DB'lerde uzun sürebilir ──
    location ~ ^/api/data-sources/\d+/(detect-objects|collect-samples|discover|run-full) {
        proxy_pass         http://vyra_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout    600s;   # 10 dk — 600+ tablo keşfi
        proxy_send_timeout    600s;
    }

    # ── 1a) Enhancement API — LLM pipeline uzun sürebilir ──
    location = /api/rag/enhance-document {
        proxy_pass         http://vyra_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout    600s;   # 10 dk — CatBoost + LLM bölüm bazlı iyileştirme
        proxy_send_timeout    600s;
        client_max_body_size  100M;
    }

    # ── 1a-2) RAG Upload/Download Enhanced — dosya oluşturma + DB kayıt ──
    location ~ ^/api/rag/(upload-enhanced|download-enhanced)/ {
        proxy_pass         http://vyra_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout    300s;   # 5 dk — selective DOCX/PDF oluşturma + DB kayıt
        proxy_send_timeout    300s;
        client_max_body_size  100M;
    }

    # ── 1b) Dialog Stream — SSE uzun sürebilir (SQL + LLM sentez) ──
    location ~ ^/api/dialogs/\d+/messages/stream$ {
        proxy_pass         http://vyra_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE stream: SQL progressive timeout (120s) + LLM sentez (60s) + margin
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_buffering       off;    # SSE için buffering kapatılmalı
    }

    # ── 1c) Backend API Proxy (genel) ──
    location /api/ {
        proxy_pass         http://vyra_backend;
        proxy_http_version 1.1;

        # Gerçek IP iletimi (rate limiter için)
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Connection pooling
        proxy_set_header   Connection        "";
    }

    # ── 2) WebSocket Proxy ──
    location /api/ws {
        proxy_pass         http://vyra_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket timeout (uzun bağlantılar için)
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }

    # ── 3) Frontend Statik Dosyalar ──
    location / {
        root    __PROJECT_ROOT__/frontend;
        index   login.html home.html;
        try_files $uri $uri/ /login.html;

        # HTML dosyaları — cache'leme (versiyon parametresi ile bust)
        location ~* \.html$ {
            expires 5m;
            add_header Cache-Control "public, must-revalidate";
        }

        # Versiyonlanmış statik dosyalar (?v=2.48.0 gibi)
        location ~* \.(js|css)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Font, ikon ve görsel dosyaları
        location ~* \.(woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|mp4|webm)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── 4) Favicon (API üzerinden) ──
    location = /favicon.ico {
        proxy_pass http://vyra_backend/api/assets/favicon;
        expires 1d;
    }

    # ── 5) Health Check (monitoring araçları için) ──
    location = /health {
        proxy_pass http://vyra_backend/api/health;
        access_log off;
    }

    # ── 6) Güvenlik — Hassas dosyaları engelle ──
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ \.(env|ini|log|sql|bak|py|pyc)$ {
        deny all;
        return 404;
    }
}

