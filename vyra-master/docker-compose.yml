# ============================================
# VYRA L1 Support API - Docker Compose
# ============================================
# Tek komutla tüm sistemi başlat: docker-compose up -d
# v2.30.1
# ============================================

services:
  # -------------------------------------------------
  #  PostgreSQL Database
  # -------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: vyra-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vyra}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5005}:5432"
    volumes:
      - vyra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vyra"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------------------------------------------------
  #  Backend (FastAPI + uvicorn)
  # -------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyra-backend
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models

  # -------------------------------------------------
  #  Frontend (Static File Server)
  # -------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vyra-frontend
    restart: unless-stopped
    command: ["python", "frontend/serve.py"]
    ports:
      - "5500:5500"
    depends_on:
      - backend

# -------------------------------------------------
#  Kalıcı Volume'lar
# -------------------------------------------------
volumes:
  vyra_pgdata:
    name: vyra_pgdata
