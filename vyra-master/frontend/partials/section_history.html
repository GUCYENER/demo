<!-- GEÇMİŞ ÇÖZÜMLER -->
<section id="sectionHistory" class="hidden">
    <!-- Modern Header -->
    <div class="history-header">
        <div class="history-header-left">
            <h2 class="history-title">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Geçmiş Çözümler
            </h2>
            <p class="history-subtitle">Tüm destek talepleriniz ve çözümleri</p>
        </div>
        <div class="history-header-right">
            <button id="btnRefreshHistory" class="btn-refresh-history" title="Yenile">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
        </div>
    </div>

    <!-- Arama ve Filtre Alanı -->
    <div class="history-search-container">
        <div class="search-row">
            <div class="search-input-wrapper">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="historySearchInput" placeholder="Talep veya çözüm içinde ara..." />
            </div>
            <!-- v2.21.1: Tür Filtresi Dropdown -->
            <div class="source-type-wrapper">
                <label>Tür:</label>
                <select id="sourceTypeFilter" class="source-type-select">
                    <option value="">Tümü</option>
                    <option value="vyra_chat">Bilgi Tabanı</option>
                </select>
            </div>
            <div class="date-picker-wrapper">
                <label>Tarih Aralığı:</label>
                <button type="button" id="dateRangeBtn" class="date-range-btn">
                    <i class="fa-solid fa-calendar"></i>
                    <span id="dateRangeText">Bu Ay</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <input type="date" id="historyStartDate" class="hidden-date-input" title="Başlangıç Tarihi"
                    aria-label="Başlangıç Tarihi" />
                <input type="date" id="historyEndDate" class="hidden-date-input" title="Bitiş Tarihi"
                    aria-label="Bitiş Tarihi" />
            </div>
            <button id="btnSearchHistory" class="btn-search">
                <i class="fa-solid fa-search"></i> Ara
            </button>
            <button id="btnClearSearch" class="btn-clear-search">
                <i class="fa-solid fa-times"></i> Temizle
            </button>
        </div>
    </div>

    <!-- Ticket Accordion List -->
    <div id="ticketHistoryList" class="ticket-history-container">
        <!-- Ticket kartları JS ile yüklenecek -->
    </div>
</section>
