<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizasyon Yönetimi - VYRA</title>
    <link rel="icon" type="image/png" href="/api/assets/favicon">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/global.css?v=2.30.1">
    <link rel="stylesheet" href="assets/css/organization_management.css?v=2.30.1">
    <link rel="stylesheet" href="assets/css/toast.css?v=2.30.1">
    <link rel="stylesheet" href="assets/css/modal.css?v=2.30.1">

    <!-- Icons -->
    <link rel="stylesheet" href="assets/vendor/fontawesome/all.min.css">
</head>

<body class="bg-[#0f1116] text-gray-200">

    <div id="organization-management-page" class="org-management-page">

        <!-- Header -->
        <div class="org-header">
            <h2>
                <i class="fas fa-building"></i>
                Organizasyon Yönetimi
            </h2>
            <button id="new-org-btn" class="btn btn-primary">
                <i class="fas fa-plus"></i> Yeni Organizasyon
            </button>
        </div>

        <!-- Toolbar -->
        <div class="org-toolbar">
            <!-- Search Box -->
            <div class="org-search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="org-search-input" placeholder="Org kodu veya adı ile ara...">
                <button id="org-search-clear" class="org-search-clear hidden" title="Aramayı temizle">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>

            <!-- Filters -->
            <div class="org-filters">
                <button class="org-filter-btn active" data-filter="all">
                    <i class="fas fa-list"></i> Tümü
                </button>
                <button class="org-filter-btn" data-filter="active">
                    <i class="fas fa-check-circle"></i> Aktif
                </button>
                <button class="org-filter-btn" data-filter="inactive">
                    <i class="fas fa-times-circle"></i> Pasif
                </button>
            </div>
        </div>

        <!-- List Container -->
        <div id="org-list-container">
            <!-- JS ile doldurulacak -->
            <div class="empty-state">
                <i class="fas fa-building fa-3x"></i>
                <p>Yükleniyor...</p>
            </div>
        </div>

        <!-- Footer: Toplam Kayıt + Pagination -->
        <div class="org-footer">
            <span class="org-total-count" id="org-total-count">Toplam: 0 kayıt</span>
            <div id="org-pagination"></div>
        </div>

        <!-- Back Button -->
        <div class="org-back-button-wrapper">
            <a href="home.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Ana Sayfaya Dön
            </a>
        </div>

    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script defer src="assets/js/config.js?v=2.48.0"></script>
    <script defer src="assets/js/auth.js?v=2.30.1"></script>
    <script defer src="assets/js/toast.js?v=2.30.1"></script>
    <script defer src="assets/js/org_utils.js?v=2.30.1"></script>
    <script defer src="assets/js/organization_management.js?v=2.30.1"></script>

    <script>
        // Auth check
        if (!isAuthenticated()) {
            window.location.href = 'login.html';
        }

        // Admin check
        const user = getCurrentUser();
        if (!user?.is_admin) {
            showToast('Bu sayfaya erişim yetkiniz yok', 'error');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 2000);
        }
    </script>

</body>

</html>
