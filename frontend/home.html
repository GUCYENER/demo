<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NGSSAI — AIOps Platform</title>
    <link rel="icon" type="image/png" href="/api/assets/favicon" />

    <!-- CSS Bundle (esbuild) -->
    <link rel="stylesheet" href="dist/bundle.min.css?v=2.52.0" />

    <!-- Icons - Local FontAwesome -->
    <link rel="stylesheet" href="assets/vendor/fontawesome/all.min.css" />
</head>

<body class="bg-[#0f1116] text-gray-200">

    <!-- GLOBAL NOTIFICATION (Her sayfada sağ üst köşede görünür) -->
    <div id="globalNotificationArea" class="global-notification-container">
        <!-- VyraNotification.init() burada dinamik bell ikonu oluşturacak -->
    </div>

    <!-- ANA KAPSAYICI -->
    <div class="flex h-screen overflow-hidden">

        <!-- SIDEBAR (partial) -->
        <div id="sidebar-slot"></div>

        <!-- ANA İÇERİK -->
        <main class="flex-1 px-5 pb-8 overflow-y-auto relative">

            <!-- Üst Bar: Logo Sol - Yazı Orta - Notification Sağ -->
            <div id="topBar" class="flex items-center justify-between pt-4 mt-2 mb-2">
                <!-- Sol: Logo -->
                <div id="topLogoArea" class="flex-shrink-0">
                    <img src="assets/images/vyra_logo_new.png" alt="NGSSAI Logo" class="top-logo-main" />
                </div>

                <!-- Orta: Başlıklar -->
                <div id="homeHeader" class="flex-1 text-center px-4">
                    <h1 class="text-2xl font-bold mb-0">Çözüme mi ihtiyacın var?</h1>
                    <h2 class="text-xl font-extrabold text-yellow-400 mb-0">
                        NGSSAI AIOps Platform
                    </h2>
                    <p class="welcome-tagline mb-4">
                        <span class="tagline-text">Hadi başlayalım</span>
                        <span class="tagline-brand">NGSSAI</span>
                        <span class="tagline-emoji">😊</span>
                    </p>
                </div>

                <!-- Sağ: Notification -->
                <div id="notificationArea" class="flex-shrink-0">
                    <!-- VyraNotification.init() burada dinamik bell ikonu oluşturacak -->
                </div>
            </div>

            <!-- SEKME ALANI - Modern SaaS Tab -->
            <div id="mainTabBar" class="modern-tab-container">
                <div class="modern-tab active" id="tabDialog" data-tab="dialog">
                    <span class="tab-text">📚 Bilgi Tabanı</span>
                    <button type="button" class="tab-fav-btn" data-tab="dialog" title="Varsayılan yap">
                        <i class="fa-solid fa-star"></i>
                    </button>
                </div>

                <div class="modern-tab" id="tabHistory" data-tab="history">
                    <span class="tab-text">Geçmiş Çözümler</span>
                    <button type="button" class="tab-fav-btn" data-tab="history" title="Varsayılan yap">
                        <i class="fa-solid fa-star"></i>
                    </button>
                </div>
            </div>

            <!-- SECTIONS (partials) -->
            <div id="sections-slot"></div>

        </main>

        <!-- MODALS (partial — main dışında) -->
        <div id="modals-slot"></div>

    </div>

    <!-- 1. Partial Loader: HTML partials'ı SENKRON yükler (bundle'dan ayrı) -->
    <script src="assets/js/partial_loader.js?v=2.52.0"></script>

    <!-- 2. JS Bundle (esbuild — tüm modüller birleştirilmiş + minify) -->
    <script defer src="dist/bundle.min.js?v=2.52.0"></script>
</body>

</html>
