            <!-- ORGANİZASYON YÖNETİMİ BÖLÜMÜ (Sadece Admin) -->
            <section id="sectionOrganizations" class="hidden">

                <div class="page-head">
                    <div class="page-title">
                        <div class="ph-icon" style="background:var(--amber-dim);color:var(--amber)">
                            <i class="fa-solid fa-building"></i>
                        </div>
                        <div class="ph-text">
                            <h1>Organizasyon Yönetimi</h1>
                            <p>Org grupları ve erişim kapsamları</p>
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <select id="orgCompanySelect" class="inp" style="min-width:180px;height:34px;font-size:12px;"></select>
                        <button id="btnNewOrg" class="btn primary">
                            <i class="fa-solid fa-plus"></i> Yeni Organizasyon
                        </button>
                    </div>
                </div>

                <div class="card">
                    <div class="search-bar">
                        <div class="inp-wrap">
                            <i class="fa-solid fa-search inp-ico" style="stroke:none;fill:var(--text-3);width:13px;height:13px"></i>
                            <input type="text" id="orgSearchInput" class="inp" placeholder="Org kodu veya adı ile ara...">
                            <button id="orgSearchClear" class="hidden" title="Aramayı temizle" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--red);cursor:pointer;padding:4px;">
                                <i class="fa-solid fa-times"></i>
                            </button>
                        </div>
                        <div style="display:flex;gap:6px;">
                            <button class="org-filter-btn btn active" data-filter="all">
                                <i class="fa-solid fa-list"></i> Tümü
                            </button>
                            <button class="org-filter-btn btn" data-filter="active">
                                <i class="fa-solid fa-check-circle"></i> Aktif
                            </button>
                            <button class="org-filter-btn btn" data-filter="inactive">
                                <i class="fa-solid fa-times-circle"></i> Pasif
                            </button>
                        </div>
                    </div>

                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Org Kodu</th>
                                <th>Org Adı</th>
                                <th>Durum</th>
                                <th>Kullanıcı</th>
                                <th>Döküman</th>
                                <th>İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="orgTableBody">
                        </tbody>
                    </table>

                    <div id="orgEmpty" class="hidden" style="padding:40px;text-align:center;color:var(--text-3);">
                        <i class="fa-solid fa-building" style="font-size:2.5rem;opacity:.4;"></i>
                        <p style="margin-top:12px;">Organizasyon bulunamadı</p>
                    </div>
                    <div id="orgLoading" style="padding:40px;text-align:center;color:var(--text-3);">
                        <i class="fa-solid fa-spinner fa-spin" style="font-size:1.8rem;"></i>
                        <p style="margin-top:12px;">Yükleniyor...</p>
                    </div>

                    <div class="pager">
                        <span id="orgTotalCount" class="pager-info">Toplam: 0 kayıt</span>
                        <div id="orgPagination" class="pager-btns"></div>
                    </div>
                </div>

            </section>
